<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石家庄桃太郎日本语</title>
    <link rel="icon" href="pic/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 面包屑导航 */
        
        .breadcrumb {
            width: 90%;
            margin: 20px auto;
            font-size: 14px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #666;
        }
        
        .breadcrumb a:hover {
            color: #EF89A0;
        }
        
        .breadcrumb span {
            margin: 0 5px;
        }
        
        .page-title {
            text-align: center;
            font-size: 26px;
            margin: 20px 0 30px;
        }
        /* 四列布局 */
        
        .diary-list {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        /* 手机端自动变1列 */
        
        @media (max-width: 768px) {
            .tel {
                display: block;
            }
            .nav-list {
                display: none;
                flex-direction: column;
            }
            .nav-list>li {
                padding: 14px 5%;
            }
            .submenu {
                position: static;
                width: 100%;
                min-width: 100px !important;
            }
            .hamburger {
                display: block;
            }
            #menu-toggle:checked+.nav-list {
                display: flex;
            }
            .diary-list {
                grid-template-columns: repeat(1, 1fr);
            }
        }
        /* 单个视频日记项 */
        
        .diary-item {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            /* 小手 */
            transition: 0.3s;
            padding: 10px;
        }
        
        .diary-item:hover {
            transform: translateY(-3px);
        }
        /* 图片 */
        
        .diary-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
        }
        /* 文字内容 */
        
        .diary-info {
            padding: 12px;
        }
        
        .diary-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        
        .diary-time {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>

<body>
    <!-- 引用导航 -->
    <div id="nav-box"></div>
    <script>
        $(function() {
            $("#nav-box").load("nav.html", function() {
                // 导航加载完成后，自动设置当前页高亮
                var path = window.location.pathname;
                var page = path.split("/").pop().replace(".html", ""); // 拿到当前页面名
                $("[data-page='" + page + "']").addClass("active");
            });
        });
    </script>
    <div class="content">
        <!-- 面包屑导航 -->
        <div class="breadcrumb">
            <a href="index.html">首页</a><span>&gt;</span>
            <span>视频日记</span>
        </div>
        <h2 class="page-title">视频日记</h2>

        <div class="diary-list">

            <!-- 项目1 -->
            <div class="diary-item" onclick="goDetail(1)">
                <img src="pic/video1.jpg" alt="视频封面">
                <div class="diary-info">
                    <div class="diary-title">寿司会</div>
                    <div class="diary-time">2026-03-17</div>
                </div>
            </div>

            <!-- 项目2 -->
            <div class="diary-item" onclick="goDetail(2)">
                <img src="pic/video2.jpg" alt="视频封面">
                <div class="diary-info">
                    <div class="diary-title">音乐会</div>
                    <div class="diary-time">2026-03-16</div>
                </div>
            </div>

            <!-- 项目3 -->
            <div class="diary-item" onclick="goDetail(3)">
                <img src="pic/momo_3.png" alt="视频封面">
                <div class="diary-info">
                    <div class="diary-title">狼人杀</div>
                    <div class="diary-time">2026-03-15</div>
                </div>
            </div>

            <!-- 项目4 -->
            <div class="diary-item" onclick="goDetail(4)">
                <img src="pic/momo_4.png" alt="视频封面">
                <div class="diary-info">
                    <div class="diary-title">吃饺子大赛</div>
                    <div class="diary-time">2026-03-14</div>
                </div>
            </div>

            <!-- 想要更多，直接复制上面这一整项即可 -->

        </div>
    </div>
    <!-- 引用底部 -->
    <div id="footer-box"></div>
    <script>
        $("#footer-box").load("footer.html");
    </script>
    <!-- 引入右下角飘窗 -->
    <div id="float-container"></div>
    <script>
        // 使用 fetch 引入公共文件
        fetch('float.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('float-container').innerHTML = data;
            });
    </script>
    <script>
        // 跳转到详情页，传id
        function goDetail(id) {
            location.href = "videoDetail.html?id=" + id;
        }
    </script>

</body>

</html>
